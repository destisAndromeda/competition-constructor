[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
competition_constructor_program = "8bDwCU1Y598BoD2BWnchBCeuvQ4rW3DUbV4c3tDvRkVX"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = """                                      \
yarn run ts-mocha -p ./tsconfig.json -t 1000000 \
./tests/program_config.ts                       \
./tests/constructor.ts                          \
./tests/swiss_system.ts                         \
./tests/swiss_system_vault_create.ts            \
./tests/swiss_system_vault_spl_create.ts        \
./tests/swiss_system_leaderboard_create.ts      \
"""
test-slow = """                                 \
yarn run ts-mocha -p ./tsconfig.json -t 1000000 \
./tests/program_config.ts                       \
./tests/constructor.ts                          \
./tests/swiss_system.ts                         \
./tests/swiss_system_stage_update.ts            \
"""